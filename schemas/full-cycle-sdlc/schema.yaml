name: full-cycle-sdlc
version: 2
description: Full-cycle SDLC workflow - PRD -> Specs -> SDD + BDD -> TDD -> Code -> Mutation -> Review
artifacts:
  - id: prd
    generates: prd.md
    description: Product requirements and acceptance criteria
    template: prd.md
    instruction: >
      Before writing the PRD, determine the bootstrap mode by checking whether
      a canonical spec already exists for each capability listed in the change:


      BOOTSTRAP MODE (no canonical spec at openspec/specs/<capability>/spec.md):

      - The current codebase is the ONLY source of truth. Do NOT use
        docs/user_stories/ as authoritative — they may be outdated.

      - Investigate the code before writing anything:
        1. Read the target page/component files and measure their size.
        2. Map all React state (useState, useRef, useMemo, derived state).
        3. Map all Supabase hooks (useSupabaseQuery, useSupabaseInsert, etc.)
           and their table, filters, and enabled conditions.
        4. Map all direct supabase.rpc() and supabase.functions.invoke() calls.
        5. Map all permission checks (usePermission, profile?.primaryRole).
        6. Trace the submit/save flow step by step, including validation
           sequence, calculation logic, and post-save side effects.
        7. Note loading, error, and empty states in the UI.
        8. Run npm run analyze:complexity and note the top complexity hotspots.
        9. Run the focused unit/integration tests to confirm green baseline.
        10. Flag any divergence between code behavior and docs/user_stories/
            as open questions — never resolve them silently.

      - Then write the PRD from code evidence, not assumptions.


      DELTA MODE (canonical spec exists):

      - Read openspec/specs/<capability>/spec.md as the behavioral baseline.

      - Do targeted code reading only to verify the specific behavior this
        change touches. Do not re-investigate the entire module.

      - Derive the PRD from the canonical spec + the delta being introduced.


      BOTH MODES — PRD content:

      Define the user problem, goals, non-goals, actors, scope, acceptance
      criteria, and release gates. Keep this product-focused. Include affected
      capabilities, measurable acceptance criteria, business-rule references,
      manual-validation needs, change classification (touches pre-existing code,
      frontend change, business-rule change, critical flow), the resulting E2E
      baseline policy (blocking, recommended, not applicable), risks, and open
      questions. This artifact is the source of truth for Specs, SDD, and BDD.
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: Capability specs as the formal contract (delta against canonical specs)
    template: spec.md
    instruction: >
      Create one delta spec file per capability listed in the PRD.
      Canonical specs live at openspec/specs/<capability>/spec.md.
      Delta specs live at openspec/changes/<change-name>/specs/<capability>/spec.md.
      Use ## headers for delta operations: ADDED Requirements, MODIFIED
      Requirements, REMOVED Requirements, RENAMED Requirements. Each requirement
      uses `### Requirement: <name>` with SHALL/MUST and at least one
      `#### Scenario:` with WHEN/THEN. The OpenSpec archive command syncs deltas
      into canonical specs, so the delta MUST be self-contained and traceable to
      the PRD acceptance criteria.
    requires:
      - prd

  - id: sdd
    generates: sdd.md
    description: Software design derived from the PRD and Specs
    template: sdd.md
    instruction: >
      Create the Software Design Document from the PRD and Specs. Define
      architecture, data flow, component boundaries, contracts, dependencies,
      migration needs, security/performance/accessibility considerations,
      rollout strategy, and technical risks. Explicitly apply the project Cursor
      rules that match the affected surfaces: frontend patterns, database
      workflow/RPC rules, edge function rules, testing, and accessibility. Do
      not introduce product scope not present in the PRD/Specs. The SDD may be
      created in parallel with BDD because both depend on Specs.
    requires:
      - specs

  - id: bdd
    generates: bdd.md
    description: Behavior scenarios derived from the PRD and Specs
    template: bdd.md
    instruction: >
      Create behavior-driven scenarios from the PRD and Specs. Use
      Given/When/Then style scenarios that are understandable by QA, product,
      and engineering. Focus on externally observable behavior, edge cases,
      permission boundaries, loading/error states, and acceptance criteria. Do
      not derive scenarios from already-written code; derive them from PRD and
      Specs and clarify gaps as open questions. The BDD may be created in
      parallel with SDD.
    requires:
      - specs

  - id: tdd
    generates: tdd.md
    description: Test-first plan derived from PRD, Specs, SDD, and BDD
    template: tdd.md
    instruction: >
      Create the test-first plan before implementation. Derive unit,
      integration, E2E, database, accessibility, manual-validation, and
      mutation-test targets only from PRD, Specs, SDD, and BDD. Do not inspect
      or mirror already-written implementation as the source of truth for
      expected behavior. Align the plan with testing-and-ci.mdc: Vitest for unit
      logic, pgTAP for schema/RPC/RLS, Edge Function tests or exceptions for
      Deno contracts, Playwright for critical browser flows, and lint/type
      gates. Apply the E2E baseline policy declared by the PRD: when blocking,
      a baseline E2E for the affected flow MUST exist or be created before any
      production code change; when recommended, document the decision; when not
      applicable, justify briefly. Identify which tests must fail before code
      changes, which fixtures/mocks are needed, and which commands form the
      gate before coding can proceed.
    requires:
      - sdd
      - bdd

  - id: code
    generates: tasks.md
    description: Implementation checklist after TDD is defined
    template: code.md
    instruction: >
      Create the implementation checklist only after TDD exists. The apply
      phase parses checkbox format, so every task must use `- [ ]`. When the
      PRD/TDD declares E2E baseline as blocking, the FIRST task group must
      confirm or create the baseline E2E for the affected flow and run it
      against the unchanged behavior before any other change. Then create or
      update the tests from tdd.md, then implement the smallest production
      change, then run verification tasks for lint, unit tests, pgTAP when
      applicable, E2E, generated Supabase types when applicable, mutation
      testing, and review handoff. Keep tasks small, ordered by dependency, and
      verifiable.
    requires:
      - tdd

  - id: mutation
    generates: mutation.md
    description: Mutation-testing result and quality gate
    template: mutation.md
    instruction: >
      Create the mutation gate report after the relevant code and tests have
      been implemented. Record the command, scope, mutation score, thresholds,
      survived mutants, equivalent mutants, exclusions, and remediation plan.
      This gate should not pass while meaningful survived mutants remain above
      the accepted threshold without an explicit reviewed exception.
    requires:
      - code

  - id: review
    generates: review.md
    description: Final engineering review and judge gate
    template: review.md
    instruction: >
      Create the final review gate after mutation results exist. Review the
      change against PRD acceptance criteria, Specs delta, SDD decisions, BDD
      scenarios, TDD evidence, baseline E2E gate enforcement, code quality,
      security, performance, accessibility, and known risks. Confirm that delta
      specs at openspec/changes/<change-name>/specs/<capability>/spec.md are
      ready to be archived into openspec/specs/<capability>/spec.md. Record the
      judge decision as pass, conditional pass, or fail, with blockers and
      follow-up actions.
    requires:
      - mutation

apply:
  requires:
    - code
  tracks: tasks.md
  instruction: |
    Implement only after prd.md, specs/**/spec.md, sdd.md, bdd.md, tdd.md, and
    tasks.md exist. If PRD/TDD declares E2E baseline as blocking for this
    change, complete the baseline tasks before any production code change.
    Start by writing or updating the tests specified in tdd.md, using only the
    PRD/Specs/SDD/BDD/TDD artifacts as the expected-behavior source of truth.
    Then implement the code tasks, mark checkboxes complete as you go, and stop
    for clarification if a task conflicts with the artifacts. Apply the
    relevant Cursor rules for each touched surface. After code is done, run the
    mutation and review gates before treating the change as complete.
